
server:
  port: 4000

jwt:
  secret: ${JWT_SECRET}

spring:
  cloud:
    gateway:
          routes:

            - id: auth-service
              uri: http://user-service:4001
              predicates:
                - Path=/api/v1/auth/**

            - id: course-service
              uri: http://course-service:4002
              predicates:
                - Path=/api/v1/course/**
              filters:
                - JwtValidation

            - id: enrollment-service
              uri: http://enrollment-service:4003
              predicates:
                - Path=/api/v1/enrollment/**
              filters:
                - JwtValidation

            - id: payment-service
              uri: http://payment-service:4004
              predicates:
                - Path=/api/v1/payments**
              filters:
                - JwtValidation

          discovery:
            locator:
              enabled: true