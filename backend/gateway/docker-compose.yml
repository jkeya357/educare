services:
  gateway-service:
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "4000:4000"
    networks:
      - education-service
    depends_on:
      - user-service
      - course-service
      - enrollment-service
      - payment-service

  user-service:
    build: ../user-service
    env_file:
      - ../user-service/.env
    ports:
      - "4001:4001"
    networks:
      - education-service

  course-service:
    build: ../course-service
    env_file:
      - ../course-service/.env
    ports:
      - "4002:4002"
    networks:
      - education-service

  enrollment-service:
    build: ../enrollment-service
    env_file:
      - ../enrollment-service/.env
    ports:
      - "4003:4003"
    networks:
      - education-service

  payment-service:
    build: ../payment-service
    env_file:
      - ../payment-service/.env
    ports:
      - "4004:4004"
    networks:
      - education-service

networks:
  education-service: